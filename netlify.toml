# Static site — no build step. Publish the repo root as-is.
[build]
  publish = "."
  command = ""

# The HTML entry point and service worker must always be revalidated so
# returning visitors pick up new deploys instead of a stale cached shell.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Fingerprint-free static assets can be cached hard; bump filenames to bust.
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Sensible security headers for a no-backend static app.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    X-Frame-Options = "DENY"
